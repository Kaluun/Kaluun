services:
  - type: web
    name: kaluun
    env: python
    region: frankfurt
    plan: free
    buildCommand: |
      pip install -r requirements.txt &&
      python manage.py collectstatic --noinput &&
      python manage.py migrate
    startCommand: gunicorn kaluun.wsgi:application --bind 0.0.0.0:$PORT --workers 2 --timeout 120
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DEBUG
        value: "False"
      - key: ALLOWED_HOSTS
        value: "kaluun.onrender.com"
      - key: DATABASE_URL
        fromDatabase:
          name: kaluun-db
          property: connectionString
      - key: SITE_URL
        value: "https://kaluun.onrender.com"
      - key: EMAIL_HOST_USER
        value: "kaluunexpresse@gmail.com"
      - key: KALUUN_EMAIL_PASSWORD
        sync: false
      - key: PYTHON_VERSION
        value: "3.11.0"

databases:
  - name: kaluun-db
    databaseName: kaluun
    user: kaluun
    plan: free
    region: frankfurt
